name: GitHub-Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Narvdeshwar
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Isometric Calendar (The City)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Language Insights (Depends upon commits)
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: percentage, lines, count
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          
          # Habits & Activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Repository Insights
          plugin_followup: yes
          plugin_followup_sections: user
          
          # Achievement system
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 10
